<svg width="920" height="240" viewBox="0 0 920 240" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Geist, system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 Z" fill="#9ca3af"/>
    </marker>
    <marker id="arrowOk" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 Z" fill="#10b981"/>
    </marker>
  </defs>

  <!-- connectors (drawn first, behind nodes) -->
  <line x1="168" y1="72" x2="232" y2="72" stroke="#9ca3af" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="372" y1="72" x2="436" y2="72" stroke="#9ca3af" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="576" y1="72" x2="640" y2="72" stroke="#10b981" stroke-width="2" marker-end="url(#arrowOk)"/>
  <!-- branch from processing down to failed/cancelled -->
  <path d="M504 100 L504 168 L640 168" stroke="#9ca3af" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M504 168 L504 168" stroke="#9ca3af" stroke-width="2"/>

  <!-- queued -->
  <rect x="32" y="50" width="136" height="44" rx="22" fill="#9ca3af" fill-opacity="0.12" stroke="#9ca3af" stroke-opacity="0.5"/>
  <circle cx="62" cy="72" r="5" fill="#9ca3af"/>
  <text x="80" y="77" font-size="15" font-weight="500" fill="#6b7280">queued</text>

  <!-- processing -->
  <rect x="368" y="50" width="136" height="44" rx="22" fill="#111317" fill-opacity="0.12" stroke="#111317" stroke-opacity="0.55"/>
  <circle cx="398" cy="72" r="5" fill="#111317"/>
  <text x="416" y="77" font-size="15" font-weight="500" fill="#111317">processing</text>

  <!-- pending (between) -->
  <rect x="232" y="50" width="136" height="44" rx="22" fill="#9ca3af" fill-opacity="0.12" stroke="#9ca3af" stroke-opacity="0.5"/>
  <circle cx="262" cy="72" r="5" fill="#9ca3af"/>
  <text x="280" y="77" font-size="15" font-weight="500" fill="#6b7280">pending</text>

  <!-- completed -->
  <rect x="640" y="50" width="148" height="44" rx="22" fill="#10b981" fill-opacity="0.12" stroke="#10b981" stroke-opacity="0.55"/>
  <circle cx="670" cy="72" r="5" fill="#10b981"/>
  <text x="688" y="77" font-size="15" font-weight="500" fill="#059669">completed</text>

  <!-- failed / cancelled -->
  <rect x="640" y="146" width="148" height="44" rx="22" fill="#f59e0b" fill-opacity="0.12" stroke="#f59e0b" stroke-opacity="0.55"/>
  <circle cx="670" cy="168" r="5" fill="#f59e0b"/>
  <text x="688" y="173" font-size="15" font-weight="500" fill="#d97706">failed</text>

  <text x="688" y="214" font-size="13" font-weight="500" fill="#9ca3af">… or cancelled</text>
</svg>
